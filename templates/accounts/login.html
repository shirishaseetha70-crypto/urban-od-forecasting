{% extends 'base.html' %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background: linear-gradient(135deg,#0f172a,#1e3a5f);">
  <div class="card" style="width:440px; border-radius:16px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div style="width:60px;height:60px;background:#3b82f6;border-radius:14px;
                    display:inline-flex;align-items:center;justify-content:center;
                    font-size:1.5rem;color:#fff;">
          <i class="fas fa-city"></i>
        </div>
        <h4 class="mt-3 fw-bold">Urban OD System</h4>
        <p class="text-muted small">Travel Intelligence Platform</p>
      </div>

      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-danger py-2 small rounded-3">{{ msg }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold small">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="fas fa-user text-muted"></i>
            </span>
            <input type="text" name="username" class="form-control border-start-0"
                   placeholder="Enter username" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="fas fa-lock text-muted"></i>
            </span>
            <input type="password" name="password" class="form-control border-start-0"
                   placeholder="Enter password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted small mb-0">
        Don't have an account?
        <a href="{% url 'register' %}" class="text-primary fw-semibold text-decoration-none">
          Register here
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
